name: CICD JAVA Maven application
on: # multiple triggers to run the workflow
 workflow_dispatch:
 push:
   branches:
      - master
jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: clone the repo
        uses: actions/checkout@v4
      - name: Install JAVA
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin' 
          java-version: '25'  
      - name: build the java package
        uses: mvn clean package
      -  name: Set up Docker
         uses: docker/setup-docker-action@v5    
      -  name: Login to Docker Hub
         uses: docker/login-action@v4
         with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }} 
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: sattar438/myjavaapp   
